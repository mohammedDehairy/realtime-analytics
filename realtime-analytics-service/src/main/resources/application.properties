spring.application.name=realtime-analytics
server.port=8080
api.security.application-keys.imotion=${API_SECURITY_APPLICATION_KEY_IMOTION}
druid.bootstrap.enabled=${DRUID_BOOTSTRAP_ENABLED:false}

# Choose the event publisher used by HeartBeatService: kafka or tinybird.
event.publisher.backend=${EVENT_PUBLISHER_BACKEND:kafka}
kafka.topic=${KAFKA_TOPIC:realtime-events}
tinybird.events.url=${TINYBIRD_EVENTS_URL:https://api.tinybird.co}
tinybird.datasource=${TINYBIRD_DATASOURCE:realtime_events}
